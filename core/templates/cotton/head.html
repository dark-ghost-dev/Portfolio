{% load static %}
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{ title|default:'Uziel Flores | Desarrollador Web' }}</title>
<meta name="description" content="{{ description|default:'Soy un desarrollador web junior, estudiante de ingeniería de software y un apasionado del mundo de la programación. Aquí podrás encontrar todos los proyectos que he creado, así como mis habilidades y medios de contacto.' }}">
<meta name="author" content="Uziel Omar Flores Torres">
<link rel="icon" href="{% static 'favicon.png' %}" type="image/png">
<link rel="canonical" href="{{ request.build_absolute_uri }}">
<meta name="theme-color" content="#0086f3">

<meta property="og:title" content="{{ title|default:'Uziel Flores | Desarrollador Web' }}">
<meta property="og:description" content="{{ og_description|default:'Portfolio profesional de Uziel Flores. Desarrollo web frontend y backend, proyectos, habilidades y contacto.' }}">
<meta property="og:type" content="website">
<meta property="og:url" content="{{ request.build_absolute_uri }}">
<meta property="og:image" content="{{ og_image|default:'' }}">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:type" content="image/jpeg">
<meta property="og:image:alt" content="{{ og_image_alt|default:'Portfolio profesional de Uziel Flores' }}">
<meta property="og:site_name" content="Uziel Flores | Desarrollador Web">
<meta property="og:locale" content="es_MX">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ title|default:'Uziel Flores | Desarrollador Web' }}">
<meta name="twitter:description" content="{{ og_description|default:'Portfolio profesional de Uziel Flores. Desarrollo web frontend y backend, proyectos, habilidades y contacto.' }}">
<meta name="twitter:image" content="{{ request.scheme }}://{{ request.get_host }}{% static 'og.jpg' %}">
<meta name="twitter:image:alt" content="{{ og_image_alt|default:'Portfolio profesional de Uziel Flores' }}">
<meta name="twitter:site" content="@DarkGhostDev">
<meta name="twitter:creator" content="@DarkGhostDev">

<meta name="robots" content="index, follow, max-image-preview:large">
